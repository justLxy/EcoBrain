# ==========================================================
# EcoBrain 主配置文件（小白友好版）
# ==========================================================
# 你可以直接改这个文件，然后执行 /ecobrain reload 热更新生效。
#
# 通用规则：
# 1) 所有小数请用英文句号，例如 0.30、1.03，不要写成 0,30。
# 2) 百分比参数统一用“小数”表示：30% = 0.30，5% = 0.05。
# 3) 如果填错材质名，插件会自动回退到默认材质，不会崩服。
# 4) 不确定时请每次只改 1~2 个参数，边改边观察市场变化。
# 5) 极端参数会导致价格剧烈波动，建议先用“推荐值”。

economy:
  ipo:
    # 【首次上市默认价格】
    # 是否启用“零信任” IPO 机制（EcoBrain 2.0 核心特性）。
    # 如果开启，所有未知新物品首次录入时，无论 base-price 填多少，都会被强制设为极低的 0.01 金币。
    # 然后由全服玩家真实的“买单”来决定它到底值不值钱。防首发套利必备。
    zero-trust: true

    # 如果 zero-trust 设为 false，则新物品首发将使用这里的固定基准价。
    # 强烈建议保留 zero-trust: true，不要依赖静态基准价。
    base-price: 0.01

    # 【理想库存目标】
    # 新物品刚录入时赋予的默认目标库存。由于 2.0 会按物品价值自动缩放，这个值仅作为冷启动锚点。
    target-inventory: 64

    # 【价格弹性系数 k】
    # 核心敏感度参数。越大，库存每变一点，价格变化越明显。
    # k 太大（如 >2）会让价格非常抖动；k 太小（如 <0.3）会让市场“钝化”。
    # 推荐：0.6 ~ 1.5
    k-factor: 1.0

trade:
  # 【交易防连点冷却（毫秒）】
  # 防止玩家超高速重复触发 buy/sell，降低并发与刷操作风险。
  # 1000 = 1秒，1500 = 1.5秒
  # 推荐：800 ~ 2500
  cooldown-ms: 1000

circuit-breaker:
  # 【单日最大涨跌阈值】
  # 若某物品相对“当日开盘价”涨跌超过这个值，会被自动冻结交易。
  # 调小：更保守，更容易触发保护。
  # 调大：更激进，允许更大波动。
  daily-limit-percent: 10

  # 【库存熔断线】
  # 当系统库存 <= 该值时，直接冻结该物品交易，避免“抽干库存”。
  # 推荐：1 ~ 5
  critical-inventory: 1

ai:
  # 【AI 调试日志开关】
  # true  = 每轮 AI 调参后输出可解释日志（状态/动作/奖励/具体调参）
  # false = 仅运行 AI，不打印调参明细
  debug-log: false

  # 【AI 调控周期（分钟）】
  # 每隔多少分钟跑一次 AI 调参。
  # 调小：反应更快，但可能更抖；调大：更平滑，但反应慢。
  schedule-minutes: 60

  # 【动态客单价(AOV)统计窗口（小时）】
  # AI 会统计过去 X 小时内的全服平均客单价作为通胀惩罚的基准。
  # 它的作用是平滑短期的大额交易。如果设得很小，一旦有人大额交易，物价就会剧烈波动。
  # 【建议设置】：
  # - 如果你的服是快节奏的肝帝服，物价波动快，设为 12 或者 24
  # - 如果你的服是慢节奏的养老服，希望物价极度平稳，设为 48 或者 72
  aov-window-hours: 24

  # 【过期商品自动清理天数】
  # 如果一个物品在系统中库存极低（<=1个），并且超过 X 天没有任何人买卖，
  # AI 会判定它为玩家恶搞生成的“滞销垃圾”（如一把命名为"哈哈"的破木剑），并自动将其从商店数据库中抹除。
  # 推荐：7
  garbage-collection-days: 7

  # ==========================================================
  # PPO 连续模型：AI 根据该物品当前的价格与库存等特征，自动分配给相应的 AI 脑(ONNX)进行推理。
  # 此处可配置各类价值体系的判定阈值。
  tiers:
    high:
      price-threshold: 50000.0  # 底价大于此值，判定为高价值物品（交给 ecobrain_high_value.onnx 调控）
      inventory-threshold: 10   # 或者理想库存小于等于此值，也判定为高价值物品
    mid:
      price-threshold: 1000.0   # 底价大于此值，判定为中价值物品（交给 ecobrain_mid_value.onnx 调控）
      inventory-threshold: 100  # 或者理想库存小于等于此值，也判定为中价值物品
    # 未满足以上条件的普通物资，将交给 ecobrain_low_value.onnx 调控
    
  tuning:
    # 【最高基础价格上限（防刷钱安全锁）】
    # 防止因为某些物品长期缺货（物理库存=0）导致 AI 循环暴涨，最后价格膨胀到上亿金币。
    # 既然你的服有高价值物品，可以设置为 5000000.0 (五百万) 甚至更高。
    # 如果物品的基础价格达到此值，将不再上涨。
    max-base-price: 1000000.0

    # 【单次调控最大限制】
    # 这是防止 AI 暴走的“安全锁”。即使 PPO 模型输出极端的涨跌幅（如翻倍或腰斩），
    # 插件也会将其强制截断在此范围之内（例如 0.30 表示单次最多涨跌 30%）。
    per-cycle-max-change-percent: 0.30

    # 【k 系数步进幅度限制】
    # 限制 ONNX 连续动作空间输出的 k_delta 单次最大调整幅度。
    k-delta: 0.02

    # 【k 的硬边界】
    # 无论 AI 如何训练，k 都不会超出这个区间。
    # 建议保持 min < max，且不要设得过窄。
    k-min: 0.2
    k-max: 10.0

    # 【爆仓阈值（强制爆仓暴跌触发条件）】
    # 当虚拟库存 current_inventory 满足：
    #   current_inventory > max(target_inventory × multiplier, min-absolute)
    # 即判定为“明显爆仓”，无论 AI 模型输出什么，都会强制介入降价。
    #
    # multiplier：相对阈值（默认 2.5，表示超过目标库存 2.5 倍）
    # min-absolute：绝对阈值下限（默认 64，避免 target 很小的物品被轻易判爆仓）
    glut-threshold-multiplier: 2.5
    glut-threshold-min-absolute: 64

    # 【上调动作价格倍率】（用于强制风控与极端无视AI的修正，例如强制稀缺拉升）
    action-up-price-rate: 1.2

    # 【下调动作价格倍率】（用于强制风控，例如玩家倾销引发强制爆仓砸盘）
    action-down-price-rate: 0.70

    # 【无成交时爆仓暴跌冷却（周期数）】
    # 当某物品处于爆仓状态但在本调控窗口内完全没有成交时，
    # 我们只允许每 N 个调控周期触发一次 FORCED_GLUT_CRASH。
    glut-no-trade-cooldown-cycles: 2

gui:
  bulk-sell:
    # 支持颜色代码：&0~&f, &l, &o, &n 等
    # 例如：&2深绿、&a浅绿、&c红色、&7灰色
    title: "&2EcoBrain 批量出售界面"

    sell-button:
      # 确认按钮材质（Bukkit Material 枚举名）
      material: LIME_STAINED_GLASS_PANE
      # 按钮显示名
      name: "&a确认出售"
      # 按钮说明（可多行）
      lore:
        - "&7点击后将结算 0-44 格全部物品"

    cancel-button:
      # 取消按钮材质
      material: RED_STAINED_GLASS_PANE
      # 按钮显示名
      name: "&c取消并退回"
      # 按钮说明（可多行）
      lore:
        - "&7安全退回所有待售物品"

    filler:
      # 底栏填充材质（45~53 里除功能按钮外的占位）
      material: BLACK_STAINED_GLASS_PANE

  market:
    # 市场物品 Lore 模板（支持颜色代码和占位符）
    # 可用占位符：
    # {hash}              -> 完整 hash
    # {hash_short}        -> 缩短 hash
    # {price}             -> 实时价格（保留两位小数）
    # {physical_stock}    -> 真实物理库存
    # {target_inventory}  -> 目标库存（AMM 锚点）
    # {virtual_inventory} -> 虚拟库存（AMM 内部池）
    item-lore:
      - ""
      - '&7&m+------------------------------+'
      - ''
      - '        &b价格: &f{price}￥'
      - '        &b库存: &f{physical_stock} / &8理想库存: {target_inventory}'
      - '        &f&l单击 &7购买 1 个'
      - '        &f&lShift+单击 &7购买 1 组'
      - '        &f&lShift+右键 &7购买 10 组'
      - '        &f&l右键 &7自定义数量购买（聊天输入）'
      - ''
      - '&7&m+------------------------------+'