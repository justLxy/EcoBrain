# ==========================================================
# EcoBrain 2.0 主配置文件
# ==========================================================
# 修改后执行 /ecobrain reload 热更新生效
#
# 配置说明：
# 1) 所有小数必须用英文句号，如 0.30，千万别写成 0,30
# 2) 百分比填小数：如 30% 就是 0.30
# 3) 材质名填错会回退默认材质，不用担心崩服
# 4) 建议每次只改个别参数，观察市场反应后再继续调
# 5) 拿不准的参数直接用推荐值就行

economy:
  ipo:
    # 核心：是否开启“零信任”起步机制。
    # 强烈建议开启！开启后，任何新录入的物品统统强制从 0.01 金币起步。
    # 它的真实价值完全由玩家随后的买单决定。这是防首发套利的绝对神器。
    zero-trust: true

    # 只有在上面设为 false 时才生效的备用起步价。不推荐依赖这个。
    base-price: 100

    # 新物品初次录入时的初始目标库存。
    # 因为 2.0 系统会自动根据物品价值分层，这个值现在只作冷启动锚点用。
    target-inventory: 64

    # 价格弹性 k。数值越大，库存变动时价格跳得越狠。
    # 太大容易抖动，太小像死水。推荐 0.6 ~ 1.5。
    k-factor: 1.0

trade:
  # 交易防连点冷却（毫秒）。1000 = 1秒。
  # 主要是防止脚本或者连点器高速刷单。推荐 800 ~ 2500。
  cooldown-ms: 500
  
  # 按 Q（丢弃键）时，第一次会自动打开“批量出售”GUI 来防误丢垃圾。
  # 如果玩家在短时间内再次按 Q，则认为是刻意丢弃：本次及持续快速按 Q 将放行丢弃，不再反复打开 GUI。
  # 推荐 500 ~ 1200（毫秒）。
  qdrop-open-bulk-sell-window-ms: 2000

circuit-breaker:
  # 涨跌停板机制。物品一天内的价格相对开盘价波动超过这个百分比，就会被冻结交易。
  daily-limit-percent: 10

  # 库存熔断线。当系统手里的真实库存小于等于这个数时，直接禁止玩家再买，防止被抽干。
  critical-inventory: 1

ai:
  # 是否在后台狂刷 AI 的调参细节（状态/动作/原因等）。平时关掉就行，查问题再开。
  debug-log: true

  # 每隔多久（分钟）让 AI 巡视一次市场并调价。
  # 时间短反应快但可能频繁跳价，时间长物价更平稳。
  schedule-minutes: 15

  # AI 用来计算全服“平均客单价”的时间窗口。
  # 肝帝服（刷得快）设 12-24，养老服（节奏慢）设 48-72。
  aov-window-hours: 24

  # 滞销垃圾清理。如果一个物品库存极低且连续这么几天都没人碰，系统会当它是玩家恶搞的垃圾数据，直接删掉。
  garbage-collection-days: 3

  # 自适应目标库存：AI 根据真实的物理库存，动态调整物品的“目标库存”。
  # 彻底解决大量新物品默认 target=64 导致无法被识别为 High/Low 的问题！
  adaptive-target:
    enabled: true
    # 平滑系数 (0.01 ~ 1.0)。值越大，目标库存向真实物理库存靠拢的速度越快。
    # 0.05 意味着每个 AI 周期（如15分钟）会向真实库存靠拢 5%。
    smoothing-factor: 0.05

  # ==========================================================
  # 物品分层路由（重中之重）
  # AI 会根据物品的底价或目标库存，判断它是哪种级别的物品，然后交给对应的模型处理。
  # ==========================================================
  tiers:
    high:
      # 高价值物品（如 Boss 掉落物）的判断门槛。交给 ecobrain_high_value.onnx 处理。
      price-threshold: 10000.0  
      # 对齐离线模拟器：高价值默认 target_inventory≈32，且自适应 target 会在 32 附近波动
      # 因此 inventory-threshold 至少应覆盖到 32，并留一定缓冲，避免冷启动阶段错误路由到 mid。
      inventory-threshold: 64
      # 与离线训练保持一致：按 tier 限制 k 的动作幅度与上下限（防止“靠 k 走捷径”）
      tuning:
        k-delta: 0.30
        k-min: 0.2
        k-max: 6.0
    mid:
      # 中等价值物品（如副本材料）的判断门槛。交给 ecobrain_mid_value.onnx 处理。
      price-threshold: 1000.0   
      inventory-threshold: 640  
      tuning:
        k-delta: 0.20
        k-min: 0.2
        k-max: 4.0
    low:
      # 低价值物品不需要阈值（默认兜底），这里只放 tuning 限制以对齐离线训练。
      tuning:
        k-delta: 0.10
        k-min: 0.2
        k-max: 3.0
    # 都不满足的，就是泥土小麦之类的破烂，全丢给 ecobrain_low_value.onnx 处理。
    
  tuning:
    # 价格天花板。如果到了这个价，AI 怎么调都不会再涨了。防刷钱最后的底线。
    max-base-price: 1000000.0

    # 允许 AI 每次微调 k 系数的最大幅度。
    k-delta: 1.00

    # k 系数的硬性上下限。
    k-min: 0.2
    k-max: 10.0

gui:
  bulk-sell:
    title: "&2EcoBrain 批量出售界面"

    sell-button:
      material: LIME_STAINED_GLASS_PANE
      name: "&a确认出售"
      lore:
        - "&7点击后将结算 0-44 格全部物品"

    cancel-button:
      material: RED_STAINED_GLASS_PANE
      name: "&c取消并退回"
      lore:
        - "&7安全退回所有待售物品"

    filler:
      material: BLACK_STAINED_GLASS_PANE

  market:
    item-lore:
      - ""
      - '&7&m+------------------------------+'
      - ''
      - '        &b价格: &f{price}￥'
      - '        &b库存: &f{physical_stock} / &8理想库存: {target_inventory}'
      - '        &b品质: {tier}'
      - '        &f&l单击 &7购买 1 个'
      - '        &f&lShift+单击 &7购买 1 组'
      - '        &f&lShift+右键 &7购买 10 组'
      - '        &f&l右键 &7自定义数量购买（聊天输入）'
      - ''
      - '&7&m+------------------------------+'

# ==========================================================
# 管理命令扩展（QuickTax 集成）
# ==========================================================
admin:
  reclaim:
    # EcoBrain “系统资金回收”会按玩家统计：
    # outstanding = SUM(SELL) - SUM(BUY) - SUM(已回收)
    #
    # 然后使用 QuickTax 命令逐个玩家扣款。
    # QuickTax 如需允许扣到负数，请在 QuickTax 的 config.yml 设置 debt-mode=2
    #
    # 可用占位符：
    # - {player} 玩家名（优先在线/离线档案名，其次数据库记录名）
    # - {uuid}   玩家 UUID
    # - {amount} 金额（两位小数）
    quicktax-command: "qt collectname {player} {amount}"

    # 小于等于该金额的 outstanding 不处理（防浮点噪声）
    min-amount: 0.01

    # 每 tick（50ms）最多派发多少条 QuickTax 命令，避免主线程卡顿
    per-tick: 5