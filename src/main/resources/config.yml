# ==========================================================
# EcoBrain 主配置文件（小白友好版）
# ==========================================================
# 你可以直接改这个文件，然后执行 /ecobrain reload 热更新生效。
#
# 通用规则：
# 1) 所有小数请用英文句号，例如 0.30、1.03，不要写成 0,30。
# 2) 百分比参数统一用“小数”表示：30% = 0.30，5% = 0.05。
# 3) 如果填错材质名，插件会自动回退到默认材质，不会崩服。
# 4) 不确定时请每次只改 1~2 个参数，边改边观察市场变化。
# 5) 极端参数会导致价格剧烈波动，建议先用“推荐值”。

economy:
  ipo:
    # 【首次上市默认价格】
    # 当某个物品第一次被玩家卖给系统时，会用这个价格作为“起步价”。
    # 调大：新物品更值钱，玩家首卖收益更高。
    # 调小：新物品更便宜，经济更保守。
    # 推荐：1000 ~ 10000
    base-price: 100.0

    # 【理想库存目标】
    # AMM 定价的库存锚点。当前库存接近这个值时，价格趋近 base-price。
    # 调大：系统更“怕缺货”，低库存时涨价更明显。
    # 调小：系统更“宽松”，库存变化对价格影响变弱。
    # 推荐：30 ~ 200
    target-inventory: 320

    # 【价格弹性系数 k】
    # 核心敏感度参数。越大，库存每变一点，价格变化越明显。
    # k 太大（如 >2）会让价格非常抖动；k 太小（如 <0.3）会让市场“钝化”。
    # 推荐：0.6 ~ 1.5
    k-factor: 1.0

trade:
  # 【交易防连点冷却（毫秒）】
  # 防止玩家超高速重复触发 buy/sell，降低并发与刷操作风险。
  # 1000 = 1秒，1500 = 1.5秒
  # 推荐：800 ~ 2500
  cooldown-ms: 1500

circuit-breaker:
  # 【单日最大涨跌阈值】
  # 若某物品相对“当日开盘价”涨跌超过这个值，会被自动冻结交易。
  # 例如 0.30 = 30%
  # 调小：更保守，更容易触发保护。
  # 调大：更激进，允许更大波动。
  # 推荐：0.20 ~ 0.50
  daily-limit-percent: 0.50

  # 【库存熔断线】
  # 当系统库存 <= 该值时，直接冻结该物品交易，避免“抽干库存”。
  # 推荐：1 ~ 5
  critical-inventory: 2

ai:
  # 【AI 调控周期（小时）】
  # 每隔多少小时跑一次 AI 调参。
  # 调小：反应更快，但可能更抖；调大：更平滑，但反应慢。
  # 推荐：1 ~ 6
  schedule-hours: 2

  # 【每轮训练批次】
  # DQN 每次训练抽取多少条经验。
  # 调大：学习更稳但更吃性能；调小：更轻量但噪声更大。
  # 推荐：16 / 32 / 64
  train-batch-size: 32

  # 【经验回放池容量】
  # 记录历史市场状态用于训练。越大记忆越多，但占用更多内存。
  # 推荐：2048 ~ 16384
  replay-buffer-capacity: 4096

  reward:
    # 奖励函数：
    # R = (w1 * TransactionVolume) - (w2 * InflationDelta) - (w3 * InventoryImbalance)
    # 简单理解：
    # - w1 越大：AI 越追求成交量（流动性）
    # - w2 越大：AI 越害怕通胀（涨价太快会被压制）
    # - w3 越大：AI 越重视库存平衡（防止极端缺货/爆仓）

    # 成交量权重（正向）
    # 推荐：0.5 ~ 2.0
    w1-transaction-volume: 1.0

    # 通胀惩罚权重（负向）
    # 推荐：0.2 ~ 1.5
    w2-inflation-delta: 0.6

    # 库存失衡惩罚权重（负向）
    # 推荐：0.2 ~ 1.5
    w3-inventory-imbalance: 0.8

  tuning:
    # 【上调动作价格倍率】
    # 1.03 表示 AI 选择“涨价”时，基价先乘以 1.03
    # 推荐：1.01 ~ 1.05
    action-up-price-rate: 1.03

    # 【下调动作价格倍率】
    # 0.97 表示 AI 选择“降价”时，基价先乘以 0.97
    # 推荐：0.95 ~ 0.99
    action-down-price-rate: 0.97

    # 【单次调控最大限制】
    # 不管 AI 想怎么调，每轮最多只允许 ±该比例，防止失控。
    # 0.05 = 每轮最多涨/跌 5%
    # 推荐：0.02 ~ 0.08
    per-cycle-max-change-percent: 0.05

    # 【k 系数步进】
    # AI 每次调控 k 的步长。实际会根据动作取 +k-delta 或 -k-delta。
    # 推荐：0.01 ~ 0.08
    k-delta: 0.03

    # 【k 的硬边界】
    # 无论 AI 如何训练，k 都不会超出这个区间。
    # 建议保持 min < max，且不要设得过窄。
    k-min: 0.2
    k-max: 3.0

    # 【通胀基准价】
    # 用于计算 InflationDelta 的参考价格。
    # 若你的服整体物价水平较高，可适当调大这个值。
    # 推荐：与 economy.ipo.base-price 同量级
    inflation-baseline-price: 50.0

gui:
  bulk-sell:
    # 支持颜色代码：&0~&f, &l, &o, &n 等
    # 例如：&2深绿、&a浅绿、&c红色、&7灰色
    title: "&2EcoBrain 批量出售舱"

    sell-button:
      # 确认按钮材质（Bukkit Material 枚举名）
      material: LIME_STAINED_GLASS_PANE
      # 按钮显示名
      name: "&a确认出售"
      # 按钮说明（可多行）
      lore:
        - "&7点击后将结算 0-44 格全部物品"

    cancel-button:
      # 取消按钮材质
      material: RED_STAINED_GLASS_PANE
      # 按钮显示名
      name: "&c取消并退回"
      # 按钮说明（可多行）
      lore:
        - "&7安全退回所有待售物品"

    filler:
      # 底栏填充材质（45~53 里除功能按钮外的占位）
      material: BLACK_STAINED_GLASS_PANE

  market:
    # 市场物品 Lore 模板（支持颜色代码和占位符）
    # 可用占位符：
    # {hash}              -> 完整 hash
    # {hash_short}        -> 缩短 hash
    # {price}             -> 实时价格（保留两位小数）
    # {physical_stock}    -> 真实物理库存
    # {virtual_inventory} -> 虚拟库存（AMM 内部池）
    item-lore:
      - ""
      - "&7实时价格: &e{price}"
      - "&7系统物理库存: &b{physical_stock}"
      - "&8(内部虚拟池: {virtual_inventory})"
      - ""
      - "&a左键: 购买 1 个"
      - "&aShift+左键: 购买 1 组"
