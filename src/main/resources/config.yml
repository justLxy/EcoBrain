# ==========================================================
# EcoBrain 主配置文件（小白友好版）
# ==========================================================
# 你可以直接改这个文件，然后执行 /ecobrain reload 热更新生效。
#
# 通用规则：
# 1) 所有小数请用英文句号，例如 0.30、1.03，不要写成 0,30。
# 2) 百分比参数统一用“小数”表示：30% = 0.30，5% = 0.05。
# 3) 如果填错材质名，插件会自动回退到默认材质，不会崩服。
# 4) 不确定时请每次只改 1~2 个参数，边改边观察市场变化。
# 5) 极端参数会导致价格剧烈波动，建议先用“推荐值”。

economy:
  ipo:
    # 【首次上市默认价格】
    # 当某个物品第一次被玩家卖给系统时，会用这个价格作为“起步价”。
    # 调大：新物品更值钱，玩家首卖收益更高。
    # 调小：新物品更便宜，经济更保守。
    # 推荐：1000 ~ 10000
    base-price: 100.0

    # 【理想库存目标】
    # AMM 定价的库存锚点。当前库存接近这个值时，价格趋近 base-price。
    # 调大：系统更“怕缺货”，低库存时涨价更明显。
    # 调小：系统更“宽松”，库存变化对价格影响变弱。
    # 推荐：30 ~ 200
    target-inventory: 192

    # 【价格弹性系数 k】
    # 核心敏感度参数。越大，库存每变一点，价格变化越明显。
    # k 太大（如 >2）会让价格非常抖动；k 太小（如 <0.3）会让市场“钝化”。
    # 推荐：0.6 ~ 1.5
    k-factor: 1.0

trade:
  # 【交易防连点冷却（毫秒）】
  # 防止玩家超高速重复触发 buy/sell，降低并发与刷操作风险。
  # 1000 = 1秒，1500 = 1.5秒
  # 推荐：800 ~ 2500
  cooldown-ms: 1000

circuit-breaker:
  # 【单日最大涨跌阈值】
  # 若某物品相对“当日开盘价”涨跌超过这个值，会被自动冻结交易。
  # 例如 0.30 = 30%
  # 调小：更保守，更容易触发保护。
  # 调大：更激进，允许更大波动。
    # 推荐：0.20 ~ 0.50
  daily-limit-percent: 0.4

  # 【库存熔断线】
  # 当系统库存 <= 该值时，直接冻结该物品交易，避免“抽干库存”。
  # 推荐：1 ~ 5
  critical-inventory: 1

ai:
  # 【AI 调试日志开关】
  # true  = 每轮 AI 调参后输出可解释日志（状态/动作/奖励/具体调参）
  # false = 仅运行 AI，不打印调参明细
  debug-log: false

  # 【AI 调控周期（分钟）】
  # 每隔多少分钟跑一次 AI 调参。
  # 调小：反应更快，但可能更抖；调大：更平滑，但反应慢。
  schedule-minutes: 60

  # 【每轮训练批次】
  # DQN 每次训练抽取多少条“经验”。
  # 调大：学习更稳但更吃性能；调小：更轻量但噪声更大。
  # 【为了最佳效果，建议调大以稳定 AI 激进调价时的脑电波】
  train-batch-size: 64

  # 【经验回放池容量】
  # 记录历史市场状态用于训练。越大记忆越多，但占用更多内存。
  # 【为了最佳效果，由于你的服物品价值跨度极大，需要更大的记忆池防止 AI “健忘”】
  replay-buffer-capacity: 8192

  # 【动态客单价(AOV)统计窗口（小时）】
  # AI 会统计过去 X 小时内的全服平均客单价作为通胀惩罚的基准。
  # 它的作用是平滑短期的大额交易。如果设得很小，一旦有人大额交易，物价就会剧烈波动。
  # 【建议设置】：
  # - 如果你的服是快节奏的肝帝服，物价波动快，设为 12 或者 24
  # - 如果你的服是慢节奏的养老服，希望物价极度平稳，设为 48 或者 72
  aov-window-hours: 48

  # 【过期商品自动清理天数】
  # 如果一个物品在系统中库存极低（<=1个），并且超过 X 天没有任何人买卖，
  # AI 会判定它为玩家恶搞生成的“滞销垃圾”（如一把命名为"哈哈"的破木剑），并自动将其从商店数据库中抹除。
  # 推荐：7
  garbage-collection-days: 7

  target-inventory:
    # 【动态理想库存开关】
    # true  = 按 item_hash 为每个物品动态计算 target_inventory，并写回数据库
    # false = 使用 IPO 建档时写入的 target_inventory（现有行为）
    enabled: true

    # 【动态目标库存范围硬边界】
    # 无论模型如何计算，最终 target_inventory 都会被夹在这个区间内
    # 推荐：min 5~50, max 100~600
    min: 5
    max: 640

    # 【价格 -> 目标库存：基线公式】
    # baseTarget = price-scale / (base_price ^ price-alpha)
    # 直觉：
    # - base_price 越大（高价值物品）=> baseTarget 越小（系统不需要囤太多）
    # - base_price 越小（低价值物品）=> baseTarget 越大（更像“耗材池”）
    # 推荐：
    # - price-alpha: 0.3 ~ 0.8（越大，高低价值差异越明显）
    # - price-scale: 1000 ~ 20000（决定总体库存量级）
    price-scale: 6000.0
    price-alpha: 0.55

    # 【成交量加成】
    # 最近窗口成交额越大，适度抬高 target，减少稀缺时价格抖动
    # 0 = 关闭；0.05~0.50 为常用区间
    volume-boost: 0.22

    # 【流速加成（买压/卖压）】
    # buy 压强（净买入）越大，抬高 target；净卖入越大，压低 target
    # 0 = 关闭；0.05~0.30 为常用区间
    flow-boost: 0.12

    # 【极端状态修正倍率】
    # 稀缺：供给临界 & 虚拟库存紧张 & 近期有卖给系统证据 -> 目标库存乘以 scarcity-multiplier
    # 爆仓：current_inventory > max(target*5, 500) -> 目标库存乘以 glut-multiplier
    # 推荐：scarcity 1.05~1.80, glut 0.40~0.95
    scarcity-multiplier: 1.35
    glut-multiplier: 0.70

    # 【单周期变化限幅（防瞬间跳价）】
    # target 每个周期最多变化的百分比，例如 0.10 = 最多 ±10%
    # 推荐：0.05 ~ 0.25
    # 注意：写回数据库时会同比例缩放虚拟库存 current_inventory，尽量保持 (Target/Current) 不变，避免非交易性跳价
    per-cycle-max-change-percent: 0.10

    # 【单周期变化绝对上限】
    # target 每个周期最多变化多少个库存（与百分比限幅取更严格的那个）
    # 推荐：10 ~ 80
    max-delta: 40

    # 【是否要求最近窗口有成交才调 target】
    # true  = 避免对“无人交易”的物品盲调导致漂移（更稳）
    # false = 即使无成交也会按价格基线缓慢收敛（更主动）
    require-recent-trade: true

  reward:
    # 奖励函数：
    # R = (w1 * TransactionVolume) - (w2 * InflationDelta) - (w3 * InventoryImbalance)
    # 简单理解：
    # - w1 越大：AI 越追求成交量（流动性）
    # - w2 越大：AI 越害怕通胀（涨价太快会被压制）
    # - w3 越大：AI 越重视库存平衡（防止极端缺货/爆仓）

    # 成交量权重（正向）
    # 如果不太看重疯狂交易，只希望保持正常的流通，给个较低的基准分即可
    # 推荐：0.3 ~ 0.8
    w1-transaction-volume: 0.4

    # 通胀惩罚权重（负向）
    # 极度厌恶通货膨胀，一旦系统发钱过多，AI就会重拳出击打压价格
    # 推荐：1.5 ~ 2.5
    w2-inflation-delta: 2.2

    # 库存失衡惩罚权重（负向）
    # 不希望玩家大规模爆仓或买空，逼迫 AI 频繁寻找平衡点
    # 推荐：1.2 ~ 2.0
    w3-inventory-imbalance: 1.8

  tuning:
    # 【最高基础价格上限（防刷钱安全锁）】
    # 防止因为某些物品长期缺货（物理库存=0）导致 AI 循环暴涨，最后价格膨胀到上亿金币。
    # 既然你的服有高价值物品，可以设置为 5000000.0 (五百万) 甚至更高。
    # 如果物品的基础价格达到此值，将不再上涨。
    max-base-price: 5000000.0

    # 【上调动作价格倍率】
    # 若你的服务器物品价值跨度极大（比如有 5,000,000 金币的物品）
    # 可以设置为极度激进的值，例如 1.50（每次 AI 决定涨价时，底价直接涨 50%）
    action-up-price-rate: 1.08

    # 【下调动作价格倍率】
    # 若想快速把毫无价值的垃圾（例如倾销的泥土）打压到 10 金币
    # 可设为 0.70（每次降价，底价直接打 7 折）甚至 0.50（直接腰斩）
    action-down-price-rate: 0.92

    # 【单次调控最大限制】
    # 这是防止 AI 暴走的“安全锁”。如果你上面填了 1.50 和 0.50
    # 这里必须相应地放宽，比如填 0.50，允许单次最大涨跌幅为 50%。
    per-cycle-max-change-percent: 0.2

    # 【k 系数步进】
    # AI 每次调控 k 的步长。k 值决定了玩家买卖时价格暴涨/暴跌的“陡峭程度”。
    # 对于跨度极大的服，建议调大以拉开高低价值物品的价格敏感度。
    k-delta: 0.02

    # 【k 的硬边界】
    # 无论 AI 如何训练，k 都不会超出这个区间。
    # 建议保持 min < max，且不要设得过窄。
    k-min: 0.2
    k-max: 2.0

gui:
  bulk-sell:
    # 支持颜色代码：&0~&f, &l, &o, &n 等
    # 例如：&2深绿、&a浅绿、&c红色、&7灰色
    title: "&2EcoBrain 批量出售界面"

    sell-button:
      # 确认按钮材质（Bukkit Material 枚举名）
      material: LIME_STAINED_GLASS_PANE
      # 按钮显示名
      name: "&a确认出售"
      # 按钮说明（可多行）
      lore:
        - "&7点击后将结算 0-44 格全部物品"

    cancel-button:
      # 取消按钮材质
      material: RED_STAINED_GLASS_PANE
      # 按钮显示名
      name: "&c取消并退回"
      # 按钮说明（可多行）
      lore:
        - "&7安全退回所有待售物品"

    filler:
      # 底栏填充材质（45~53 里除功能按钮外的占位）
      material: BLACK_STAINED_GLASS_PANE

  market:
    # 市场物品 Lore 模板（支持颜色代码和占位符）
    # 可用占位符：
    # {hash}              -> 完整 hash
    # {hash_short}        -> 缩短 hash
    # {price}             -> 实时价格（保留两位小数）
    # {physical_stock}    -> 真实物理库存
    # {virtual_inventory} -> 虚拟库存（AMM 内部池）
    item-lore:
      - ""
      - '&7&m+------------------------------+'
      - ''
      - '        &b价格: &f{price}￥'
      - '        &b库存: &f{physical_stock}'
      - '        &f&l单击 &7购买 1 个'
      - '        &f&lShift+单击 &7购买 1 组'
      - ''
      - '&7&m+------------------------------+'
