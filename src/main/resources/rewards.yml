  # 卖出数量（SELL_QTY）- 档位与奖励如注释，SELL 默认减半
  - id: "sell_qty_100"
    type: "SELL_QTY"
    target: 100
    display: { material: CHEST, name: "&a累计卖出 &e{target}&a 个", lore: [ "&7进度: &f{progress}&7/&f{target}", "&7状态: {status}", "&8点击领取奖励" ] }
    commands: [ "console: mm items give {player} jyssp 3" ]

  - id: "sell_qty_1000"
