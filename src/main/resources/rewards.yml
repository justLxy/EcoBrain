gui:
  title: "&bEcoBrain - 奖励"
  size: 54
  border:
    material: BLACK_STAINED_GLASS_PANE
    name: "&8 "
  back:
    slot: 45
    material: ARROW
    name: "&e返回"

# 奖励列表：
# - type: SELL_MONEY / SELL_QTY / BUY_MONEY / BUY_QTY
# - target: 目标值（金额为小数，数量为整数）
# - commands: 领取时执行的命令（默认 console 执行）
#   - "console: eco give {player} diamond 1"
#   - "player: say 我领取了奖励！"
#
# 本文件内置的“默认奖励内容”说明（你可以按需修改每条 rewards[*].commands）：
#
# - 数量档位奖励（SELL_QTY / BUY_QTY）默认给 jyssp（金钥匙碎片）数量：
#   SELL 档位：100 -> 5, 1000 -> 32, 2500 -> 64, 5000 -> 128, 10000 -> 256, 25000 -> 512, 50000 -> 1024, 100000 -> 2048, 500000 -> 4096
#   BUY 档位：在 SELL 基础上去掉最右一位零（1, 10, 25, 50, 100, 250, 500, 1000, 5000），奖励数量同上对应档位。
#
# - 金额档位奖励（SELL_MONEY / BUY_MONEY）默认给 jyssp 数量：
#   SELL 档位：1000 -> 5, 10000 -> 32, 100000 -> 64, 1000000 -> 128, 10000000 -> 256, 100000000 -> 512, 1000000000 -> 1024
#   BUY 档位：在 SELL 基础上去掉最右一位零（100, 1000, 10000, 100000, 1000000, 10000000），奖励数量同上对应档位。
#
# 注意：玩家“卖给系统”的奖励（SELL_QTY / SELL_MONEY）默认在上述基础上【减半】。
# 若减半后出现小数（例如 5/2=2.5），默认向上取整（2.5 -> 3）。
rewards:
  # =========================
  # 数量档位：SELL 100/1000/2500/5000/10000/25000/50000/100000/500000；BUY 1/10/25/50/100/250/500/1000/5000
