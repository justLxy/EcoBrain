gui:
  title: "&bEcoBrain - 奖励"
  size: 54
  border:
    material: BLACK_STAINED_GLASS_PANE
    name: "&8 "
  back:
    slot: 45
    material: ARROW
    name: "&e返回"

# 奖励列表：
# - type: SELL_MONEY / SELL_QTY / BUY_MONEY / BUY_QTY
# - target: 目标值（金额为小数，数量为整数）
# - commands: 领取时执行的命令（默认 console 执行）
#   - "console: eco give {player} diamond 1"
#   - "player: say 我领取了奖励！"
#
# 本文件内置的“默认奖励内容”说明（你可以按需修改每条 rewards[*].commands）：
#
# - 数量档位奖励（SELL_QTY / BUY_QTY）默认给 jyssp（金钥匙碎片）数量：
#   10 -> 1
#   100 -> 2
#   250 -> 3
#   500 -> 4
#   1000 -> 5
#   2500 -> 8
#   5000 -> 12
#   10000 -> 18
#   50000 -> 30
#
# - 金额档位奖励（SELL_MONEY / BUY_MONEY）默认给 jyssp 数量：
#   100 -> 1
#   1000 -> 2
#   10000 -> 3
#   100000 -> 5
#   1000000 -> 8
#   10000000 -> 12
#   100000000 -> 20
